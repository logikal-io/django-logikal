[[mappings]]
method = 'python'
pattern = '**.py'

[[mappings]]
method = 'jinja2'
pattern = '**.html.j'
silent = 'false'
trimmed = 'true'
newstyle_gettext = 'true'
extensions = """\
    jinja2.ext.i18n,\
    django_logikal.templates.extensions.LanguageExtension,\
    django_logikal.templates.extensions.TimeZoneExtension\
    """
