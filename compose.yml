name: django-logikal

services:
  validator:
    # Note: make sure to update the version in the docs/index.rst as well when changing it here!
    # Available versions: https://github.com/validator/validator/pkgs/container/validator/versions
    # Commit date: 2026-05-29
    image: ghcr.io/validator/validator@sha256:1e02132147c89c4d7e9c612a6cefcab35edb3dbc08fd19bab077dbabbb6fbce5
    ports: [{target: 8888}]

  postgres: &postgres
    # Note: make sure to update the version in the docs/index.rst as well when changing it here!
    # Google Cloud versions: https://docs.cloud.google.com/sql/docs/postgres/db-versions
    # Postgres versions: https://hub.docker.com/_/postgres
    image: postgres:18.1
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports: [{target: 5432}]
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql
    healthcheck:
      test: pg_isready --username dev --host 127.0.0.1
      interval: 3s
      timeout: 3s
      retries: 5

  postgres-static:
    <<: *postgres
    ports: [{target: 5432}]
    volumes:
      - type: volume
        source: postgres_static_data
        target: /var/lib/postgresql

volumes:
  postgres_data:
  postgres_static_data:
